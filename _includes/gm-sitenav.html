<nav class="gm-sitenav" id="gm-sitenav" aria-label="Site navigation">
  <a href="/" class="gm-sitenav-home">Government Methods</a>
  <div class="gm-sitenav-links">
    <a href="/methodsbrownbag/">Brown Bag</a>
    <a href="/mathcamp/">Math Camp</a>
    <a href="/about.html">About</a>
    <a href="/ask.html">Ask</a>
  </div>
</nav>
<script>
  (function () {
    var p = window.location.pathname;
    var isIndex = (p === "/" || p === "/index.html" || p.endsWith("/index.html"));

    if (isIndex) {
      // Hide nav on the home page — it has its own full-page navigation
      var nav = document.getElementById("gm-sitenav");
      if (nav) nav.style.display = "none";
      return;
    }

    // Mark current page link
    document.querySelectorAll(".gm-sitenav-links a").forEach(function (a) {
      var href = a.getAttribute("href") || "";
      if (href && p.endsWith(href.replace(/^\//, ""))) {
        a.setAttribute("aria-current", "page");
      }
    });

    // Wrap page body content (everything except sitenav + fixed toggle)
    // in a centering div, since theme:none produces no main/content wrapper.
    document.addEventListener("DOMContentLoaded", function () {
      var wrapper = document.createElement("div");
      wrapper.className = "gm-article-content";
      var toWrap = Array.from(document.body.children).filter(function (el) {
        return el.id !== "gm-sitenav" &&
               !el.classList.contains("gm-theme-toggle--fixed") &&
               el.tagName !== "SCRIPT";
      });
      if (toWrap.length) {
        document.body.insertBefore(wrapper, toWrap[0]);
        toWrap.forEach(function (el) { wrapper.appendChild(el); });
      }
    });
  })();
</script>
